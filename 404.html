<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReferVo</title>
  <script>
    // Handle /c/CODE routes
    const path = window.location.pathname;
    const connectMatch = path.match(/^\/c\/([A-Za-z0-9]+)\/?$/i);
    
    if (connectMatch) {
      // Redirect to /c/ with code in hash
      window.location.replace('/c/#' + connectMatch[1].toUpperCase());
    } else {
      // Actually a 404 - redirect to home
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
