<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returning to ReferVo...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 24px;
    }
    .logo span:first-child { color: #f97316; }
    .logo span:last-child { color: white; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #f97316;
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
    }
    .btn:hover { background: #ea580c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>Refer</span><span>Vo</span></div>
    <div class="spinner"></div>
    <h1>Setup Complete!</h1>
    <p>Returning you to the app...</p>
    <a href="refervo://wallet?refresh=true" class="btn">Open ReferVo</a>
  </div>
  <script>
    // Try to open the app immediately
    setTimeout(function() {
      window.location.href = 'refervo://wallet?refresh=true';
    }, 1500);
  </script>
</body>
</html>
