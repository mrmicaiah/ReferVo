<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected Successfully - ReferVo</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="apple-touch-icon" href="images/icon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .status-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(180deg, var(--gray-light) 0%, var(--white) 100%);
    }
    .status-card {
      background: var(--white);
      border-radius: 24px;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    .status-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    .status-card h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    .status-card p {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }
    .charity-name {
      font-weight: 600;
      color: var(--orange);
    }
    .status-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-border);
    }
    .status-footer p {
      font-size: 0.875rem;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="status-page">
    <div class="status-card">
      <div class="status-icon">✅</div>
      <h1>Successfully Connected!</h1>
      <p>
        Thank you! <span class="charity-name" id="charityName">Your organization</span>'s Stripe account is now connected to ReferVo.
      </p>
      <p>
        When ReferVo users choose to donate their referral earnings to your organization, the funds will be transferred directly to your Stripe account.
      </p>
      <div class="status-footer">
        <p>You can close this window.</p>
      </div>
    </div>
  </div>

  <script>
    // Get charity name from URL params if provided
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    if (name) {
      document.getElementById('charityName').textContent = name;
    }
  </script>
</body>
</html>
